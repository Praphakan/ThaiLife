<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ThaiLife — Vivre en Thaïlande</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080a0f; --s1:#0f1117; --border:rgba(255,255,255,.07); --border2:rgba(255,255,255,.12);
  --text:#edeae0; --sub:#6b6b80; --gold:#f5a623; --ff-num:'Barlow Condensed',sans-serif; --ff:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:#000;color:var(--text);font-family:var(--ff);overflow:hidden}

.shell{max-width:480px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;background:var(--bg);position:relative;box-shadow:0 0 60px rgba(0,0,0,.6)}
.col{flex:1;display:flex;flex-direction:column;min-height:0;min-width:0}

/* BRAND (shared) */
.brand{display:flex;align-items:baseline;gap:7px}
.brand-mark{font-family:var(--ff-num);font-size:21px;font-weight:900;letter-spacing:.3px;line-height:1}
.brand-mark .a{color:var(--text)} .brand-mark .b{color:var(--gold)}
.brand-dot{width:5px;height:5px;background:var(--gold);border-radius:50%;display:inline-block;margin-bottom:2px}
.brand-tag{font-size:9px;letter-spacing:1.6px;text-transform:uppercase;color:var(--sub);font-weight:500}

/* MOBILE TOP BAR */
.topbar{flex-shrink:0;height:52px;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;background:rgba(8,10,15,.94);backdrop-filter:blur(20px);border-bottom:.5px solid var(--border);z-index:20}
.tab-name{font-family:var(--ff-num);font-size:14px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--gold)}

/* STAGE */
.stage{flex:1;position:relative;min-height:0;background:var(--bg)}
.mod{position:absolute;inset:0;width:100%;height:100%;border:0;display:none;background:var(--bg)}
.mod.on{display:block}
.mod-loading{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:var(--bg);z-index:5}
.mod-loading.on{display:flex}
.spin{width:26px;height:26px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.mod-loading span{font-size:11px;letter-spacing:1px;color:var(--sub);text-transform:uppercase;font-family:var(--ff-num);font-weight:600}

/* NAV — shared button base */
.tab{background:none;border:none;color:var(--sub);cursor:pointer;font-family:var(--ff);transition:color .18s,background .18s}
.tab svg{stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.tab .tab-ico svg{width:22px;height:22px}
.tab.active{color:var(--gold)}
.tab-lbl{font-weight:600}

/* MOBILE BOTTOM NAV */
.tabbar{flex-shrink:0;display:flex;background:rgba(8,10,15,.96);backdrop-filter:blur(20px);
  border-top:.5px solid var(--border);padding:6px 8px calc(6px + env(safe-area-inset-bottom));z-index:20}
.tab--bottom{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 4px;border-radius:14px}
.tab--bottom .tab-lbl{font-size:10.5px}
.tab--bottom .tab-ico{width:44px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:12px;transition:background .18s}
.tab--bottom.active .tab-ico{background:rgba(245,166,35,.12)}

/* DESKTOP SIDEBAR (hidden on mobile) */
.sidebar{display:none}
.sb-brand{padding:6px 10px 20px;border-bottom:.5px solid var(--border);margin-bottom:14px}
.sb-brand .brand-mark{font-size:26px}
.sb-nav{display:flex;flex-direction:column;gap:4px}
.tab--side{display:flex;align-items:center;gap:13px;padding:12px 13px;border-radius:12px;text-align:left}
.tab--side .tab-ico{display:flex;align-items:center;justify-content:center;width:22px;height:22px;flex-shrink:0}
.tab--side .tab-lbl{font-size:14.5px;letter-spacing:.2px}
.tab--side:hover{background:rgba(255,255,255,.035);color:var(--text)}
.tab--side.active{background:rgba(245,166,35,.1);color:var(--gold)}
.tab--side.active:hover{background:rgba(245,166,35,.14)}
.sb-foot{margin-top:auto;padding:14px 12px 4px;border-top:.5px solid var(--border);
  font-size:10px;letter-spacing:.6px;color:var(--sub);line-height:1.6}

@media (min-width:900px){
  .shell{max-width:1400px;flex-direction:row;box-shadow:0 0 90px rgba(0,0,0,.75)}
  .topbar{display:none}
  .tabbar{display:none}
  .sidebar{display:flex;flex-direction:column;width:214px;flex-shrink:0;padding:20px 14px 16px;
    background:rgba(8,10,15,.96);border-right:.5px solid var(--border);z-index:20}
}
</style>
</head>

  </div>
</div>

const NAMES={quiz:"Quiz Visa",cost:"Co\u00fbt de la vie",tracker:"Suivi Visa"};
const FRAME={quiz:"fr-quiz",cost:"fr-cost",tracker:"fr-tracker"};
const loaded={quiz:false,cost:false,tracker:false};

function b64ToStr(b64){
  const bin=atob(b64), bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));
  return new TextDecoder('utf-8').decode(bytes);
}
function ensureLoaded(tab){
  if(loaded[tab]) return;
  const f=document.getElementById(FRAME[tab]);
  const L=document.getElementById('loading'), LT=document.getElementById('loadTxt');
  LT.textContent=({quiz:'Chargement du quiz',cost:'Chargement de la carte',tracker:'Chargement du suivi'})[tab]||'Chargement';
  L.classList.add('on');
  f.addEventListener('load',()=>L.classList.remove('on'),{once:true});
  f.srcdoc=b64ToStr(APPS[tab]);
  loaded[tab]=true;
}
function switchTab(tab){
  Object.keys(FRAME).forEach(t=>document.getElementById(FRAME[t]).classList.toggle('on',t===tab));
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  const tn=document.getElementById('tabName'); if(tn) tn.textContent=NAMES[tab];
  ensureLoaded(tab);
  try{localStorage.setItem('thk_tab',tab)}catch(e){}
}
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));

window.addEventListener('message',function(ev){
  const d=ev.data; if(!d||!d.__thk) return;
  if(d.type==='goto' && FRAME[d.tab]){
    switchTab(d.tab);
    if(d.visa){
      const send=()=>{try{document.getElementById('fr-tracker').contentWindow.postMessage({__thk:true,type:'prefillVisa',visa:d.visa},'*')}catch(e){}};
      setTimeout(send,600);
    }
  }
});

let start='quiz';
try{const s=localStorage.getItem('thk_tab'); if(s&&FRAME[s]) start=s;}catch(e){}
switchTab(start);
</script>
